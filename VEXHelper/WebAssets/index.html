<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VEXHelper Remote Display</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="overlay">
        <div class="message">
            <h1>VEXHelper Remote</h1>
            <p>Click anywhere to connect and enable audio</p>
        </div>
    </div>
    
    <!-- SVG Progress Border -->
    <svg class="progress-ring" width="100%" height="100%">
        <!-- Background Track -->
        <path id="track" />
        <!-- Progress Path -->
        <path id="indicator" />
    </svg>
    
    <div class="container">
        <div class="glass-panel">
            <div class="timer-display" id="timer">0:00</div>
            <div class="status-indicator" id="status">Disconnected</div>
            <div class="progress-container">
                <div class="progress-bar" id="progress"></div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
